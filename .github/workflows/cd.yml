# workflow -> Pipeline
# workflow name
name: CD Pipeline

# event on which you want this pipeline to be triggered
on:
  push:
    branches: [ "main" ]
#   pull_request:
#     branches: [ "main" ]

# jobs
jobs:
  deploy:
    # server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t mayank7082/youtube-backend:latest .

      - name: Push Docker Image
        run: docker push mayank7082/youtube-backend:latest

      - name: Build Successful
        run: echo "Docker Image built successfully and pushed to Docker"


  
